services:
  postgres:
    image: postgres:15
    container_name: container-postgres
    restart: always
    profiles: ["app", "init", "dev"]
    environment:
      POSTGRES_USER: ${DATABASE_USER_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_USER_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - "5432:5432"
    networks:
      - webnet
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER_USERNAME} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  prisma-migrate:
    build:
      context: ..
      dockerfile: container/Dockerfile.prisma-migrate
    image: meeting-room-booking/prisma-tools:latest
    container_name: prisma-migrate
    profiles: ["migrate", "init", "dev"]
    environment:
      DATABASE_URL: ${CONTAINER_DB_URL}
    depends_on:
      postgres:
        condition: service_healthy
    command: npx prisma migrate deploy
    networks:
      - webnet

  prisma-seed:
    build:
      context: ..
      dockerfile: container/Dockerfile.prisma-migrate
    image: meeting-room-booking/prisma-tools:latest
    container_name: prisma-seed
    profiles: ["seed", "dev"]
    environment:
      DATABASE_URL: ${CONTAINER_DB_URL}
    depends_on:
      prisma-migrate:
        condition: service_completed_successfully
    command: npx ts-node --compiler-options '{"module":"CommonJS"}' prisma/seed.ts
    networks:
      - webnet

  nextjs-app:
    build:
      context: ..
      dockerfile: container/Dockerfile.nextjs-app
    image: meeting-room-booking/nextjs-app:latest
    container_name: nextjs-app
    profiles: ["app", "init", "dev"]
    expose:
      - "3000"
    environment:
      BETTER_AUTH_URL: https://${SERVER_NAME}
      NEXT_PUBLIC_BASE_URL: https://${SERVER_NAME}
    depends_on:
      - postgres
      - nginx
    networks:
      - webnet
    extra_hosts:
      - "${SERVER_NAME}:host-gateway"

  nginx:
    build:
      context: ..
      dockerfile: container/Dockerfile.nginx
    image: meeting-room-booking/nginx:latest
    container_name: nginx
    profiles: ["app", "init", "dev"]
    ports:
      - "80:80"
      - "443:443"
    environment:
      SERVER_NAME: ${SERVER_NAME}
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: /etc/nginx/startup.sh
    networks:
      - webnet

  cert-init:
    image: certbot/certbot
    container_name: cert-init
    profiles: ["cert-init"]
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    command: >
      certonly --webroot -w /var/www/certbot
      --keep-until-expiring
      --email ${EMAIL}
      --agree-tos
      --no-eff-email
      -d ${SERVER_NAME}

  cert-renew:
    image: certbot/certbot
    container_name: cert-renew
    profiles: ["cert-renew"]
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: /bin/sh -c
    command: >
      "trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h;
      done"
    depends_on:
      duckdns-updater:
        condition: service_started

  duckdns-updater:
    image: curlimages/curl:latest
    container_name: duckdns
    profiles: ["cert-renew"]
    environment:
      SERVER_NAME: ${SERVER_NAME}
      DUCKDNS_TOKEN: ${DUCKDNS_TOKEN}
    entrypoint: /bin/sh -c
    command: >
      "trap exit TERM;
      while :; do
        curl -s \"https://www.duckdns.org/update?domains=${SERVER_NAME}&token=${DUCKDNS_TOKEN}&ip=\";
        sleep 24h;
      done"

volumes:
  postgres_data:

networks:
  webnet:
